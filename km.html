     <script>

        const messageForm = document.getElementById('messageForm');
        const statusDiv = document.getElementById('form-status');
        const messageScriptURL = 'https://script.google.com/macros/s/AKfycbxDmfFf03WFfGOLgUzcmo8phCOUpl17JR0F5lOwJGT10u4EVgOY5wy9rxprmPihflaI/exec';

        messageForm.addEventListener('submit', e => {
            e.preventDefault();
            statusDiv.textContent = 'Sending...';
            fetch(messageScriptURL, { method: 'POST', body: new FormData(messageForm)})
                .then(response => response.json())
                .then(data => {
                    if (data.result === 'success') {
                        statusDiv.textContent = 'Message Sent Successfully!';
                        statusDiv.style.color = 'green';
                        messageForm.reset();
                        setTimeout(() => { statusDiv.textContent = ''; }, 5000);
                    } else { throw new Error(data.error); }
                })
                .catch(error => {
                    statusDiv.textContent = 'Error! Please try again.';
                    statusDiv.style.color = 'red';
                    console.error('Error!', error.message);
                });
        });
    
                    
const uploadForm = document.getElementById('uploadForm');
const fileInput = document.getElementById('fileInput');
const uploadStatusDiv = document.getElementById('upload-status');

const uploadScriptURL = 'https://script.google.com/macros/s/AKfycbyhjKy7OmQqB7qJ7QgNZYpn8niliWDf6IwyPpF6faEtV5WUuIxdjSQpwHx0H_gInAvQ/exec';

uploadForm.addEventListener('submit', async (e) => { // Using async to handle uploads one-by-one
    e.preventDefault();

    const files = fileInput.files;
    if (files.length === 0) {
        uploadStatusDiv.textContent = 'Please select at least one file.';
        uploadStatusDiv.style.color = 'red';
        return;
    }

    const uploadButton = uploadForm.querySelector('button');
    uploadButton.disabled = true;
    uploadButton.textContent = 'Uploading...';

    for (let i = 0; i < files.length; i++) {
        const file = files[i];
        uploadStatusDiv.textContent = `Uploading file ${i + 1} of ${files.length}: ${file.name}`;
        uploadStatusDiv.style.color = '#333';

        try {
            const result = await uploadFile(file);
            if (result.result !== 'success') {
                throw new Error(result.error || 'An unknown error occurred.');
            }
        } catch (error) {
            uploadStatusDiv.textContent = `Error uploading ${file.name}: ${error.message}`;
            uploadStatusDiv.style.color = 'red';
            uploadButton.disabled = false;
            uploadButton.textContent = 'Upload Files';
            return; 
        }
    }

    uploadStatusDiv.textContent = 'All files uploaded successfully!';
    uploadStatusDiv.style.color = 'green';
    uploadForm.reset();
    setTimeout(() => { uploadStatusDiv.textContent = ''; }, 5000);

    uploadButton.disabled = false;
    uploadButton.textContent = 'Upload Files';
});

function uploadFile(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => {
            const fileData = {
                filename: file.name,
                mimeType: file.type,
                data: reader.result.split(',')[1]
            };
            fetch(uploadScriptURL, {
                method: 'POST',
                body: JSON.stringify(fileData)
            })
            .then(res => res.json())
            .then(data => resolve(data))
            .catch(err => reject(err));
        };
        reader.onerror = (error) => {
            reject(error);
        };
    });
}
    
    </script>


    <script>
  const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbweyvfgqRwpKVr3y7wJ8jt58QIyKyOAXMISRe_0Ocqbugh-kCrld3wwJWq49mMcJSkU/exec';

  window.addEventListener('load', trackVisitor);

  function trackVisitor() {
    Promise.all([
      getIpLocation(), // This is the new, 3-stage fallback function
      getBatteryData(),
      getDeviceData()
    ])
    .then(([ipData, batteryData, deviceData]) => {
      const payload = {
        
        ip: ipData.ip || 'N.A',
        region: ipData.region || 'N.A',
        city: ipData.city || 'N.A',
        latitude_ip: ipData.latitude_ip || 'N.A',
        longitude_ip: ipData.longitude_ip || 'N.A',
        
        // Navigator Data
        platform: navigator.platform || 'N.A',
        resolution: `${window.screen.width}x${window.screen.height}`,
        
        // Battery Data
        batteryLevel: batteryData.level,
        isCharging: batteryData.charging,
        
        // Device Data
        devicePlatform: deviceData.platform,
        platformVersion: deviceData.version,
        deviceModel: deviceData.model
      };
      
      sendToBeacon(payload);
    })
    .catch(err => {
      console.error('Tracker Error', err.message);
    });
  }


  function getIpLocation() {
    const url1 = 'https://ipapi.co/json/?t=' + new Date().getTime();
    return fetch(url1, { cache: 'no-cache' })
      .then(res => res.json())
      .then(data => {
        if (data.error) throw new Error('API 1 (ipapi.co) failed.');
     // console.log('Using API 1: ipapi.co'); [uncomment to add]
     // console.log('Using API 1: ipapi.co'); [uncomment to add]


        return {
          ip: data.ip,
          region: data.region,
          city: data.city,
          latitude_ip: data.latitude,
          longitude_ip: data.longitude
        };
      })
      .catch(err1 => {
        // 2. API 1 failed. Try API 2 (ip-api.com)
        console.warn(err1.message, 'Trying fallback API 2 (ip-api.com).');
        const url2 = 'https://ip-api.com/json/?t=' + new Date().getTime();
        return fetch(url2, { cache: 'no-cache' })
          .then(res => res.json())
          .then(data => {
            if (data.status !== 'success') throw new Error('API 2 (ip-api.com) failed.');
            console.log('Using API 2: ip-api.com');
            return {
              ip: data.query,
              region: data.regionName,
              city: data.city,
              latitude_ip: data.lat,
              longitude_ip: data.lon
            };
          })
          .catch(err2 => {
            // 3. API 2 failed. Try API 3 (geolocation-db.com)
            console.warn(err2.message, 'Trying fallback API 3 (geolocation-db.com).');
            const url3 = 'https://geolocation-db.com/json/';
            return fetch(url3, { cache: 'no-cache' })
              .then(res => res.json())
              .then(data => {
                if (!data.IPv4) throw new Error('API 3 (geolocation-db.com) failed.');
                console.log('Using API 3: geolocation-db.com');
                return {
                  ip: data.IPv4,
                  region: data.state,
                  city: data.city,
                  latitude_ip: data.latitude,
                  longitude_ip: data.longitude
                };
              });
          });
      })
      .catch(() => {
        // If ALL THREE APIs fail, return an empty object
        console.error('All 3 IP APIs failed. This is likely an ad blocker.');
        return {};
      });
  }


  function getBatteryData() {
    return new Promise(resolve => {
      let data = { level: 'N.A', charging: 'N.A' };
      if (!('getBattery' in navigator)) return resolve(data);
      navigator.getBattery()
        .then(b => {
          data.level = (b.level * 100).toFixed(0) + '%';
          data.charging = b.charging ? 'Yes_click here' : 'No_click here';
          resolve(data);
        })
        .catch(() => resolve(data));
    });
  }

  function getDeviceData() {
    return new Promise(resolve => {
      if ('userAgentData' in navigator) {
        navigator.userAgentData.getHighEntropyValues(['model', 'platformVersion'])
          .then(ua => {
            resolve({
              platform: navigator.userAgentData.platform || 'N.A',
              version: ua.platformVersion || 'N.A',
              model: ua.model || 'N.A'
            });
          })
          .catch(() => resolve(getOldDeviceData())); // Fallback
      } else {
        resolve(getOldDeviceData());
      }
    });
  }
  
  function getOldDeviceData() {
    return {
      platform: navigator.platform || 'N.A',
      version: 'N.A',
      model: navigator.userAgent
    };
  }

  function sendToBeacon(payload) {
    const params = new URLSearchParams();
    for (const key in payload) {
      params.append(key, payload[key]);
    }
    const beacon = new Image();
    beacon.src = `${GAS_WEB_APP_URL}?${params.toString()}`;
  //console.log('Final 3-Stage Resilient Tracker Beacon Sent.'); [uncomment to add]
  //console.log('Final 3-Stage Resilient Tracker Beacon Sent.'); [uncomment to add]

  }
</script>
